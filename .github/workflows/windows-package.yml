name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/windows-package.yml'
      - 'cmd/**'
      - 'internal/**'
      - 'build/windows/**'
      - 'scripts/windows/**'
      - 'tests_go/**'
      - 'README.md'
      - 'AGENTS.md'
      - 'vendor/ffmpeg/README.md'
      - 'go.mod'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install build dependencies
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Install ffmpeg
        shell: pwsh
        run: |
          choco install ffmpeg -y --no-progress
          $ffmpegToolsDir = 'C:\ProgramData\chocolatey\lib\ffmpeg\tools'
          $realBinary = Get-ChildItem -Path $ffmpegToolsDir -Recurse -Filter ffmpeg.exe |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $realBinary) {
            throw "ffmpeg.exe was not found under $ffmpegToolsDir"
          }
          $versionOutput = & $realBinary -version 2>&1
          if ($LASTEXITCODE -ne 0) {
            throw "ffmpeg.exe at $realBinary is not runnable"
          }
          $versionOutput | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path vendor/ffmpeg | Out-Null
          Copy-Item $realBinary vendor/ffmpeg/ffmpeg.exe -Force

      - name: Run Go tests
        shell: pwsh
        run: |
          go test ./...

      - name: Build Windows package
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\build\windows\build.ps1

      - name: Smoke test shell context menu
        shell: pwsh
        run: |
          $exePath = '.\dist\AMRToMP3.exe'
          $rootKey = 'HKCU:\Software\Classes\SystemFileAssociations\.amr\shell\AMRToMP3.Convert'

          if (-not (Test-Path $exePath)) {
            throw "Packaged executable was not found at $exePath"
          }

          try {
            & $exePath install-shell
            if ($LASTEXITCODE -ne 0) {
              throw "install-shell failed with exit code $LASTEXITCODE"
            }

            powershell -ExecutionPolicy Bypass -File .\scripts\windows\assert-context-menu.ps1
          }
          finally {
            & $exePath uninstall-shell | Out-Null
          }

          if (Test-Path $rootKey) {
            throw "Context menu key should be removed after uninstall: $rootKey"
          }

      - name: Smoke test conversion
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\scripts\windows\smoke-convert.ps1 -ExePath .\dist\AMRToMP3.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AMRToMP3-windows
          path: |
            dist/AMRToMP3-Setup.exe
            dist/AMRToMP3.exe
          if-no-files-found: error
