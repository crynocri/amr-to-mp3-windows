name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/windows-package.yml'
      - 'amr_to_mp3/**'
      - 'build/windows/**'
      - 'tests/**'
      - 'README.md'
      - 'vendor/ffmpeg/README.md'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Install ffmpeg
        shell: pwsh
        run: |
          choco install ffmpeg -y --no-progress
          $shim = 'C:\ProgramData\chocolatey\bin\ffmpeg.exe'
          if (-not (Test-Path $shim)) {
            throw "ffmpeg.exe was not found at $shim"
          }
          New-Item -ItemType Directory -Force -Path vendor/ffmpeg | Out-Null
          Copy-Item $shim vendor/ffmpeg/ffmpeg.exe -Force

      - name: Run tests
        shell: pwsh
        run: |
          python -m unittest discover -s tests -v

      - name: Build Windows package
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\build\windows\build.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AMRToMP3-windows
          path: dist/AMRToMP3
          if-no-files-found: error
