name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/windows-package.yml'
      - 'amr_to_mp3/**'
      - 'build/windows/**'
      - 'tests/**'
      - 'README.md'
      - 'vendor/ffmpeg/README.md'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Install ffmpeg
        shell: pwsh
        run: |
          choco install ffmpeg -y --no-progress
          $ffmpegToolsDir = 'C:\ProgramData\chocolatey\lib\ffmpeg\tools'
          $realBinary = Get-ChildItem -Path $ffmpegToolsDir -Recurse -Filter ffmpeg.exe |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $realBinary) {
            throw "ffmpeg.exe was not found under $ffmpegToolsDir"
          }
          $versionOutput = & $realBinary -version 2>&1
          if ($LASTEXITCODE -ne 0) {
            throw "ffmpeg.exe at $realBinary is not runnable"
          }
          $versionOutput | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path vendor/ffmpeg | Out-Null
          Copy-Item $realBinary vendor/ffmpeg/ffmpeg.exe -Force

      - name: Run tests
        shell: pwsh
        run: |
          python -m unittest discover -s tests -v

      - name: Build Windows package
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\build\windows\build.ps1

      - name: Smoke test bundled ffmpeg
        shell: pwsh
        run: |
          $packageExe = '.\dist\AMRToMP3.exe'
          $probeLog = Join-Path $PWD 'amr-to-mp3-probe.log'
          if (-not (Test-Path $packageExe)) {
            throw "Packaged executable was not found at $packageExe"
          }
          if (Test-Path $probeLog) {
            Remove-Item $probeLog -Force
          }
          $env:AMR_TO_MP3_PROBE_LOG = $probeLog
          $process = Start-Process -FilePath $packageExe -ArgumentList '--probe-ffmpeg' -PassThru -Wait
          if (Test-Path $probeLog) {
            Get-Content $probeLog
          }
          if ($process.ExitCode -ne 0) {
            throw "Bundled ffmpeg probe failed"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AMRToMP3-windows
          path: dist/AMRToMP3.exe
          if-no-files-found: error
